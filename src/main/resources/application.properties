server.port=8083
spring.application.name=servico-triagem

spring.datasource.url=jdbc:postgresql://${DB_HOST:healthsys-postgres-triagem}:${DB_PORT:5432}/${DB_NAME:triagem_db}
spring.datasource.username=${DB_USER:healthsys}
spring.datasource.password=${DB_PASS:healthsys}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.initialization-fail-timeout=60000

spring.rabbitmq.host=healthsys-rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

logging.level.com.healthsys.triagem=DEBUG
logging.level.org.springframework=INFO
logging.level.root=INFO

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true