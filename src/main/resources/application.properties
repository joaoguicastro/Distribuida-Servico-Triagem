server.port=8083
spring.application.name=servico-triagem

# DATABASE
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:triagem_db}
spring.datasource.username=${DB_USER:healthsys}
spring.datasource.password=${DB_PASS:healthsys}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# RABBITMQ
spring.rabbitmq.host=healthsys-rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# LOG
logging.level.com.healthsys.triagem=DEBUG
logging.level.root=INFO

#health
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true